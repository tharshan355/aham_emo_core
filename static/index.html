<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHAM_ZEN // NEURAL_INTERFACE</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --midnight: #050505; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--midnight); height: 100vh; overflow: hidden; color: #fff; }

        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 30px;
            text-align: center; width: 90%; max-width: 400px;
        }
        
        #main-wrapper { display: none; opacity: 0; width: 100%; height: 100vh; flex-direction: row; transition: 1.5s; }
        #canvas-container { flex: 1; position: relative; background: #000; cursor: crosshair; }
        
        #ui-side { 
            width: 420px; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(40px); border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; padding: 40px;
        }

        .brand-name { font-size: 32px; letter-spacing: 10px; font-weight: 200; margin-bottom: 5px; }
        .brand-name span { color: var(--neon-pink); font-weight: 900; text-shadow: 0 0 20px var(--neon-pink); }
        
        #chat-area { flex: 1; overflow-y: auto; margin: 30px 0; padding-right: 15px; scroll-behavior: smooth; }
        .msg { margin-bottom: 25px; animation: slideIn 0.4s ease forwards; }
        .msg-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-bottom: 6px; }
        .msg-content { 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 4px 18px 18px 18px; 
            font-size: 15px; line-height: 1.5; border-left: 3px solid var(--neon-cyan);
        }

        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 8px 8px 8px 25px; display: flex; align-items: center;
        }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }

        #micBtn {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: var(--neon-cyan); color: #000; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        #micBtn.active { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); transform: scale(1.1); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="glass-card">
            <h1 style="letter-spacing: 8px; font-weight: 200; margin-bottom: 40px;">ZEN_CORE</h1>
            <div id="g_id_onload"
                 data-client_id="920870736896-tjt9f187s9nmhlvmdirvnknsg5hei88d.apps.googleusercontent.com"
                 data-callback="onSignIn">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill"></div>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="canvas-container"></div>
        <div id="ui-side">
            <h1 class="brand-name">AHAM<span>ZEN</span></h1>
            <p id="user-display" style="font-size: 10px; color: #444; letter-spacing: 2px;">SECURE_SESSION</p>
            <div id="chat-area"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Neural command..." onkeypress="if(event.key==='Enter') send()">
                <button id="micBtn" onclick="toggleMic()">🎤</button>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let isThinking = false;
        let userEmail = "";
        let userName = "";

        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            userName = payload.given_name || "COMMANDER";
            document.getElementById('user-display').innerText = `SECURE_SESSION // ${userEmail.toUpperCase()}`;
            document.getElementById('auth-screen').style.transform = 'translateY(-100%)';
            document.getElementById('main-wrapper').style.display = 'flex';
            setTimeout(() => { document.getElementById('main-wrapper').style.opacity = '1'; init3D(); }, 500);
        }

        // --- DUST SPHERE 3D ENGINE ---
        let scene, camera, renderer, dustPoints;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const particleCount = 18000; // Increased density
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(particleCount * 3);

            for(let i = 0; i < particleCount * 3; i+=3) {
                const r = 2.5 + (Math.random() * 0.2); // Slight variance in radius for "depth"
                const phi = Math.acos(-1 + (2 * (i/3)) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;
                pos[i] = r * Math.cos(theta) * Math.sin(phi);
                pos[i+1] = r * Math.sin(theta) * Math.sin(phi);
                pos[i+2] = r * Math.cos(phi);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ 
                size: 0.012, 
                color: 0x00ffff, 
                transparent: true, 
                opacity: 0.7, 
                blending: THREE.AdditiveBlending 
            });
            dustPoints = new THREE.Points(geo, mat);
            scene.add(dustPoints);
            camera.position.z = 6;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            dustPoints.rotation.y += 0.0015;
            dustPoints.rotation.x += 0.0005;

            // Color Transition Logic
            const targetColor = isThinking ? new THREE.Color(0xff00ff) : new THREE.Color(0x00ffff);
            dustPoints.material.color.lerp(targetColor, 0.05);
            
            const pos = dustPoints.geometry.attributes.position.array;
            for(let i = 0; i < pos.length; i+=3) {
                const dist = Math.sqrt(pos[i]**2 + pos[i+1]**2 + pos[i+2]**2);
                const wave = Math.sin(time * 2 + dist * 2) * (isListening || isThinking ? 0.04 : 0.008);
                pos[i] *= (1 + wave);
                pos[i+1] *= (1 + wave);
                pos[i+2] *= (1 + wave);
            }
            dustPoints.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        // --- LOGIC & VOICE ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        function toggleMic() {
            if(!isListening) {
                isListening = true; document.getElementById('micBtn').classList.add('active'); recognition.start();
            } else {
                isListening = false; document.getElementById('micBtn').classList.remove('active'); recognition.stop();
            }
        }
        recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; send(); isListening = false; document.getElementById('micBtn').classList.remove('active'); };

        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim(); if(!msg) return;
            input.value = '';
            isThinking = true;

            const chat = document.getElementById('chat-area');
            chat.innerHTML += `<div class="msg"><p class="msg-label" style="color:var(--neon-cyan)">${userName.toUpperCase()}</p><div class="msg-content">${msg}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, user_email: userEmail })
                });
                const data = await res.json();
                
                chat.innerHTML += `<div class="msg"><p class="msg-label" style="color:var(--neon-pink)">ZEN_CORE</p><div class="msg-content" style="border-left-color:var(--neon-pink);">${data.response}</div></div>`;
                chat.scrollTop = chat.scrollHeight;

                const speech = new SpeechSynthesisUtterance(data.response);
                speech.pitch = 0.85; 
                speech.rate = 1.0;
                speech.onend = () => { isThinking = false; };
                window.speechSynthesis.speak(speech);

            } catch (e) {
                isThinking = false;
                chat.innerHTML += `<div class="msg"><p class="msg-label">SYSTEM</p><div class="msg-content">Neural link error. Check Vercel Logs.</div></div>`;
            }
        }
    </script>
</body>
</html>
