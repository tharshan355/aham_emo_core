<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAM_EMO // CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* The Chat Box - Adjusted Size to not hide particles */
        #chat-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 450px; /* Adjusted Width */
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00d4ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        #chat-display {
            height: 300px; /* Adjusted Height */
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
        }

        #chat-display::-webkit-scrollbar { width: 5px; }
        #chat-display::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 5px; }

        .input-group { display: flex; gap: 10px; }
        input {
            flex: 1;
            background: transparent;
            border: 1px solid #00d4ff;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .msg { margin-bottom: 10px; line-height: 1.4; }
        .user-label { color: #fff; font-weight: bold; }
        .aham-label { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-wrapper">
    <div id="chat-display"></div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Command AHAM..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">RUN</button>
    </div>
</div>

<script>
    // --- 1. THE DUST PARTICLES (Three.js) ---
    let scene, camera, renderer, stars;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 1;

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

        // Particle Size Adjustment
        const material = new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.005 }); 
        stars = new THREE.Points(geometry, material);
        scene.add(stars);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
    }

    function animate() {
        requestAnimationFrame(animate);
        stars.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    // --- 2. THE CHAT LOGIC (Groq API) ---
    const API_KEY = "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";

    async function send() {
        const input = document.getElementById('userInput');
        const display = document.getElementById('chat-display');
        const text = input.value.trim();
        if (!text) return;

        display.innerHTML += `<div class="msg"><span class="user-label">SRI ➤</span> ${text}</div>`;
        input.value = '';
        display.scrollTop = display.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{ role: "system", content: "You are AHAM, a witty AI assistant for Sri." }, { role: "user", content: text }]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            display.innerHTML += `<div class="msg"><span class="aham-label">AHAM ➤</span> ${reply}</div>`;
            display.scrollTop = display.scrollHeight;
        } catch (e) {
            display.innerHTML += `<div class="msg" style="color:red">ERR: CONNECTION_FAIL</div>`;
        }
    }

    init();
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
