<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHAM_ZEN // MOBILE_CORE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --dark: #050505; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #auth-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Layout starts as Column for Mobile */
        #main-ui { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        
        #canvas-box { flex: 1.5; background: #000; width: 100%; position: relative; min-height: 300px; }
        
        #side-panel { 
            flex: 1; 
            background: rgba(10,10,10,0.98); 
            border-top: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            padding: 15px;
            max-height: 50vh;
        }

        /* Desktop Switch: Side-by-Side */
        @media (min-width: 768px) {
            #main-ui { flex-direction: row; }
            #canvas-box { flex: 1; }
            #side-panel { width: 380px; height: 100vh; max-height: 100vh; border-top: none; border-left: 1px solid #333; }
        }

        .brand { font-size: 20px; letter-spacing: 4px; margin-bottom: 15px; text-align: center; font-weight: bold; color: var(--cyan); }
        .brand span { color: var(--pink); }
        
        #chat { flex: 1; overflow-y: auto; margin-bottom: 10px; scrollbar-width: none; }
        #chat::-webkit-scrollbar { display: none; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); border-left: 3px solid var(--cyan); font-size: 14px; line-height: 1.4; }
        
        .input-area { display: flex; background: #1a1a1a; border-radius: 30px; padding: 5px 15px; border: 1px solid #444; align-items: center; }
        input { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 16px; } /* 16px prevents mobile zoom */
        
        #mic-btn { background: none; border: none; color: var(--cyan); cursor: pointer; font-size: 22px; padding: 0 10px; transition: 0.3s; }
        #mic-btn.recording { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h2 style="letter-spacing:8px; margin-bottom:30px;">ZEN_CORE</h2>
        <div id="g_id_onload" data-client_id="920870736896-tjt9f187s9nmhlvmdirvnknsg5hei88d.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="main-ui">
        <div id="canvas-box"></div>
        <div id="side-panel">
            <div class="brand">AHAM<span>ZEN</span></div>
            <div id="chat"></div>
            <div class="input-area">
                <button id="mic-btn" onclick="toggleMic()">🎤</button>
                <input type="text" id="userInput" placeholder="Ask Sri..." onkeypress="if(event.key==='Enter') sendText()">
            </div>
        </div>
    </div>

    <script>
        let user_email = "", isThinking = false, scene, camera, renderer, dust, originalPositions;

        function handleLogin(response) {
            const data = JSON.parse(atob(response.credential.split('.')[1]));
            user_email = data.email;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            initSphere();
            setTimeout(() => {
                const msg = "System ready. Welcome back, Sri.";
                addMessage("ZEN", msg, true);
                speak(msg);
            }, 1000);
        }

        function initSphere() {
            scene = new THREE.Scene();
            const box = document.getElementById('canvas-box');
            camera = new THREE.PerspectiveCamera(50, box.clientWidth / box.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(box.clientWidth, box.clientHeight);
            box.appendChild(renderer.domElement);

            const count = 2000; 
            const geo = new THREE.BufferGeometry();
            const verts = new Float32Array(count * 3);
            originalPositions = new Float32Array(count * 3);

            for(let i=0; i<count; i++) {
                const y = 1 - (i / (count - 1)) * 2;
                const rAtY = Math.sqrt(1 - y * y);
                const theta = 2.3999632297 * i; 
                verts[i*3] = Math.cos(theta) * rAtY * 2.5;
                verts[i*3+1] = y * 2.5;
                verts[i*3+2] = Math.sin(theta) * rAtY * 2.5;
                originalPositions.set([verts[i*3], verts[i*3+1], verts[i*3+2]], i*3);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            dust = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0x00ffff, transparent: true, opacity: 0.8 }));
            scene.add(dust);
            camera.position.z = 7;
            
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            const box = document.getElementById('canvas-box');
            camera.aspect = box.clientWidth / box.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(box.clientWidth, box.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const breath = 1 + (Math.sin(Date.now() * 0.002) * (isThinking ? 0.15 : 0.04)); 
            const pos = dust.geometry.attributes.position.array;
            for(let i=0; i<pos.length; i++) pos[i] = originalPositions[i] * breath;
            dust.geometry.attributes.position.needsUpdate = true;
            dust.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 1.05; utter.rate = 1.0; utter.lang = 'en-US';
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Google')));
            if(femaleVoice) utter.voice = femaleVoice;
            synth.speak(utter);
        }

        function addMessage(sender, text, isAi) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg';
            if(isAi) div.style.borderLeftColor = 'var(--pink)';
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function toggleMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            const btn = document.getElementById('mic-btn');
            recognition.onstart = () => { btn.classList.add('recording'); };
            recognition.onend = () => { btn.classList.remove('recording'); };
            recognition.onresult = (event) => {
                document.getElementById('userInput').value = event.results[0][0].transcript;
                sendText();
            };
            recognition.start();
        }

        async function sendText() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text || isThinking) return;
            input.value = "";
            addMessage("SRI", text, false);
            isThinking = true;
            try {
                const res = await fetch(`/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text, user_email: user_email })
                });
                const data = await res.json();
                addMessage("ZEN", data.response, true);
                speak(data.response);
            } catch(e) { console.error(e); }
            isThinking = false;
        }
    </script>
</body>
</html>
