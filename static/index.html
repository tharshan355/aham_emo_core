<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAM_ZEN // CORE</title>
    <style>
        :root { --bg: #050505; --accent: #00d4ff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; letter-spacing: 4px; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; color: #fff; }
        .aham { align-self: flex-start; background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); }
        
        .input-box { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        input { flex: 1; background: #111; border: 1px solid #222; padding: 15px; color: white; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="header">AHAM_ZEN // MOBILE_CORE</div>
    <div id="chat-container"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Message AHAM..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            if (!input.value.trim()) return;

            const userMsg = input.value;
            container.innerHTML += `<div class="msg user">${userMsg}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg })
                });
                const data = await response.json();
                
                container.innerHTML += `<div class="msg aham">${data.response}</div>`;
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                container.innerHTML += `<div class="msg" style="color:red">SYSTEM ERROR: CONNECTION INTERRUPTED</div>`;
            }
        }
    </script>
</body>
</html>
