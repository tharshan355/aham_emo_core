<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHAM_ZEN // NEURAL_INTERFACE</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --midnight: #050505; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--midnight); height: 100vh; overflow: hidden; color: #fff; }

        /* --- STUNNING GLASSMORHISM LOGIN --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1), opacity 1s;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px; border-radius: 30px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            width: 90%; max-width: 400px;
        }
        
        /* --- MAIN DASHBOARD --- */
        #main-wrapper { 
            display: none; opacity: 0; width: 100%; height: 100vh; 
            background: #000; flex-direction: row; transition: 1.5s;
        }
        #canvas-container { flex: 1; position: relative; }
        
        #ui-side { 
            width: 420px; background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(40px); border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; padding: 40px;
        }

        .brand-name { font-size: 32px; letter-spacing: 10px; font-weight: 200; margin-bottom: 5px; }
        .brand-name span { color: var(--neon-pink); font-weight: 900; text-shadow: 0 0 20px var(--neon-pink); }
        
        #chat-area { flex: 1; overflow-y: auto; margin: 30px 0; padding-right: 15px; }
        .msg { margin-bottom: 25px; animation: slideIn 0.4s ease forwards; }
        .msg-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-bottom: 6px; }
        .msg-content { 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 4px 18px 18px 18px; 
            font-size: 15px; line-height: 1.5; border-left: 3px solid var(--neon-cyan);
        }

        /* COMMAND INPUT */
        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 8px 8px 8px 25px; display: flex; align-items: center;
        }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }

        #micBtn {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: var(--neon-cyan); color: #000; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        #micBtn.active { background: var(--neon-pink); box-shadow: 0 0 25px var(--neon-pink); transform: scale(1.1); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        @media (max-width: 768px) {
            #main-wrapper { flex-direction: column; }
            #ui-side { width: 100%; height: 55%; padding: 25px; }
            #canvas-container { height: 45%; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="glass-card">
            <div style="font-size: 50px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--neon-cyan));">⚛️</div>
            <h1 style="letter-spacing: 8px; font-weight: 200; margin-bottom: 10px;">ZEN_CORE</h1>
            <p style="color: #555; font-size: 11px; margin-bottom: 45px; letter-spacing: 3px;">ENCRYPTED_ACCESS_ONLY</p>
            
            <div id="g_id_onload"
                 data-client_id="920870736896-tjt9f187s9nmhlvmdirvnknsg5hei88d.apps.googleusercontent.com"
                 data-callback="onSignIn">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill" data-width="280"></div>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="canvas-container"></div>
        <div id="ui-side">
            <h1 class="brand-name">AHAM<span>ZEN</span></h1>
            <p id="user-display" style="font-size: 10px; color: #444; letter-spacing: 2px;">SECURE_SESSION // ...</p>
            
            <div id="chat-area"></div>
            
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Enter voice command..." onkeypress="if(event.key==='Enter') send()">
                <button id="micBtn" onclick="toggleMic()">🎤</button>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let userEmail = "";
        let userName = "";

        // --- GOOGLE SIGN-IN ---
        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            userName = payload.given_name;

            document.getElementById('user-display').innerText = `SECURE_SESSION // ${userEmail.toUpperCase()}`;
            
            const auth = document.getElementById('auth-screen');
            auth.style.transform = 'scale(1.2) translateY(-100%)';
            auth.style.opacity = '0';
            
            setTimeout(() => {
                auth.style.display = 'none';
                const main = document.getElementById('main-wrapper');
                main.style.display = 'flex';
                setTimeout(() => { main.style.opacity = '1'; init3D(); }, 100);
            }, 1000);
        }

        // --- 3D NEURAL SPHERE ---
        let scene, camera, renderer, sphere, geo, originalPos;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            geo = new THREE.IcosahedronGeometry(2, 35);
            const mat = new THREE.PointsMaterial({ size: 0.012, color: 0x00ffff, transparent: true, opacity: 0.7 });
            sphere = new THREE.Points(geo, mat);
            scene.add(sphere);
            camera.position.z = 5;
            originalPos = geo.attributes.position.array.slice();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = geo.attributes.position.array;
            const t = Date.now() * 0.002;
            let intensity = isListening ? 0.4 : 0.1;
            
            for (let i = 0; i < pos.length; i += 3) {
                const x = originalPos[i], y = originalPos[i+1], z = originalPos[i+2];
                const wave = Math.sin(t + x * 1.5 + y * 1.5) * intensity;
                pos[i] = x * (1 + wave);
                pos[i+1] = y * (1 + wave);
                pos[i+2] = z * (1 + wave);
            }
            geo.attributes.position.needsUpdate = true;
            sphere.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // --- COMMUNICATION HUB ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        function toggleMic() {
            if(!isListening) {
                isListening = true; document.getElementById('micBtn').classList.add('active');
                recognition.start();
            } else {
                isListening = false; document.getElementById('micBtn').classList.remove('active');
                recognition.stop();
            }
        }
        recognition.onresult = (e) => { 
            document.getElementById('userInput').value = e.results[0][0].transcript; 
            send(); 
            toggleMic(); 
        };

        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim(); if(!msg) return;
            input.value = '';

            const chat = document.getElementById('chat-area');
            chat.innerHTML += `<div class="msg"><p class="msg-label" style="color:var(--neon-cyan)">${userName.toUpperCase()}</p><div class="msg-content">${msg}</div></div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, user_email: userEmail })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg"><p class="msg-label" style="color:var(--neon-pink)">ZEN_CORE</p><div class="msg-content" style="border-left-color:var(--neon-pink);">${data.response}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
                
                const speech = new SpeechSynthesisUtterance(data.response);
                speech.pitch = 0.9; speech.rate = 1.1;
                window.speechSynthesis.speak(speech);
            } catch (e) { console.error("CORE_TIMEOUT"); }
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            if(renderer) renderer.setSize(container.clientWidth, container.clientHeight);
            if(camera) { camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); }
        });
    </script>
</body>
</html>
