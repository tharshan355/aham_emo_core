<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAM_EMO // CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        #chat-wrapper {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px; /* Size Adjustment */
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00d4ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        #chat-display {
            height: 250px; /* Size Adjustment */
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
            font-size: 14px;
        }

        .input-group { display: flex; gap: 10px; }
        input {
            flex: 1;
            background: #111;
            border: 1px solid #00d4ff;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .user-label { color: #fff; font-weight: bold; }
        .aham-label { color: #00d4ff; font-weight: bold; text-shadow: 0 0 5px #00d4ff; }
    </style>
</head>
<body>

<div id="chat-wrapper">
    <div id="chat-display"></div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Command AHAM..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">RUN</button>
    </div>
</div>

<script>
    let scene, camera, renderer, stars;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 1;

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 6000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

        const material = new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.005, transparent: true, opacity: 0.8 });
        stars = new THREE.Points(geometry, material);
        scene.add(stars);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
    }

    function animate() {
        requestAnimationFrame(animate);
        stars.rotation.y += 0.0008;
        stars.rotation.x += 0.0005;
        renderer.render(scene, camera);
    }

    async function send() {
        const input = document.getElementById('userInput');
        const display = document.getElementById('chat-display');
        const text = input.value.trim();
        if (!text) return;

        display.innerHTML += `<div class="msg"><span class="user-label">SRI ➤</span> ${text}</div>`;
        input.value = '';
        display.scrollTop = display.scrollHeight;

        try {
            // Calling our secure Python API
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            const reply = data.response || "Error in processing.";

            display.innerHTML += `<div class="msg"><span class="aham-label">AHAM ➤</span> ${reply}</div>`;
            display.scrollTop = display.scrollHeight;
        } catch (e) {
            display.innerHTML += `<div class="msg" style="color:red">ERR: SYSTEM_OFFLINE</div>`;
        }
    }

    init3D();
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
