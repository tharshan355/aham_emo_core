<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHAM_ZEN // CORE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
        #main-ui { display: none; height: 100vh; flex-direction: row; }
        #canvas-box { flex: 1; background: #000; }
        #side-panel { width: 400px; background: rgba(5,5,5,0.98); border-left: 1px solid #222; display: flex; flex-direction: column; padding: 30px; }
        .brand { font-size: 24px; letter-spacing: 8px; margin-bottom: 20px; text-align: center; }
        .brand span { color: var(--pink); font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--cyan); }
        .zen-msg { border-left-color: var(--pink); }
        .input-area { display: flex; background: #111; border-radius: 30px; padding: 5px 15px; border: 1px solid #333; }
        input { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div style="text-align:center">
            <h2 style="letter-spacing:5px">ZEN_CORE</h2>
            <div id="g_id_onload" data-client_id="920870736896-tjt9f187s9nmhlvmdirvnknsg5hei88d.apps.googleusercontent.com" data-callback="handleLogin"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <div id="main-ui">
        <div id="canvas-box"></div>
        <div id="side-panel">
            <div class="brand">AHAM<span>ZEN</span></div>
            <div id="chat"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Command Sri..." onkeypress="if(event.key==='Enter') send()">
            </div>
        </div>
    </div>

    <script>
        let user_email = "";
        let isThinking = false;
        let scene, camera, renderer, dust, originalPositions;

        function handleLogin(response) {
            const data = JSON.parse(atob(response.credential.split('.')[1]));
            user_email = data.email;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            initSphere();
        }

        function initSphere() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, (window.innerWidth-400)/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            document.getElementById('canvas-box').appendChild(renderer.domElement);
            renderer.setSize(window.innerWidth - 400, window.innerHeight);

            const count = 15000;
            const geo = new THREE.BufferGeometry();
            const verts = new Float32Array(count * 3);
            originalPositions = new Float32Array(count * 3);

            for(let i=0; i<count; i++) {
                const y = 1 - (i / (count - 1)) * 2;
                const rAtY = Math.sqrt(1 - y * y);
                const theta = 2.399963229728653 * i; 
                verts[i*3] = Math.cos(theta) * rAtY * 2.5;
                verts[i*3+1] = y * 2.5;
                verts[i*3+2] = Math.sin(theta) * rAtY * 2.5;
                originalPositions.set([verts[i*3], verts[i*3+1], verts[i*3+2]], i*3);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            dust = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.015, color: 0x00ffff }));
            scene.add(dust);
            camera.position.z = 7;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const breath = 1 + (Math.sin(Date.now() * 0.002) * 0.015); 
            const pos = dust.geometry.attributes.position.array;
            for(let i=0; i<pos.length; i++) pos[i] = originalPositions[i] * breath;
            dust.geometry.attributes.position.needsUpdate = true;
            dust.material.color.lerp(new THREE.Color(isThinking ? 0xff00ff : 0x00ffff), 0.1);
            renderer.render(scene, camera);
        }

        async function send() {
            const text = document.getElementById('userInput').value;
            if(!text) return;
            document.getElementById('userInput').value = "";
            document.getElementById('chat').innerHTML += `<div class="msg">SRI: ${text}</div>`;
            isThinking = true;

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text, user_email: user_email })
            });
            const data = await res.json();
            isThinking = false;
            document.getElementById('chat').innerHTML += `<div class="msg zen-msg">ZEN: ${data.response}</div>`;
        }
    </script>
</body>
</html>
