<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHAM_ZEN // CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #00ffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; display: flex; height: 100vh; flex-direction: row; }
        
        /* Auto-Adjust for PC vs Phone */
        #canvas-container { flex: 1; background: #000; position: relative; }
        #ui-side { width: 380px; background: rgba(5, 5, 10, 0.95); border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 20px; z-index: 10; transition: 0.3s; }
        
        /* Mobile Layout Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #ui-side { width: 100%; height: 50%; border-left: none; border-top: 1px solid #00ffff; padding: 15px; }
            #canvas-container { height: 50%; }
        }

        #chat-area { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; scroll-behavior: smooth; font-size: 14px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; background: rgba(0, 255, 255, 0.03); line-height: 1.4; border-left: 2px solid #333; }
        .sri-name { color: #00ffff; font-weight: bold; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .zen-name { color: #ff88ff; font-weight: bold; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        .input-group { display: flex; gap: 8px; align-items: center; background: #0a0a15; padding: 6px 12px; border-radius: 20px; border: 1px solid #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; outline: none; font-size: 16px; width: 100%; }
        #micBtn { background: none; border: 1px solid #ff88ff; color: #ff88ff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        #micBtn.active { background: #ff88ff; color: #000; box-shadow: 0 0 15px #ff88ff; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-side">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:#ff88ff; margin:0; font-weight:300; letter-spacing:2px;">ZEN_CORE</h2>
            <button onclick="clearMemory()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer;">CLEAR DATA</button>
        </div>
        <div id="chat-area"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Talk to ZEN..." onkeypress="if(event.key==='Enter') send()">
            <button id="micBtn" onclick="toggleMic()">🎤</button>
        </div>
    </div>

    <script>
        // --- 1. MEMORY SYSTEM (LocalStorage) ---
        let userName = localStorage.getItem('user_name') || "Sri";
        
        function checkIdentity(text) {
            if (text.toLowerCase().includes("my name is ")) {
                userName = text.split("is ")[1];
                localStorage.setItem('user_name', userName);
                return true;
            }
            return false;
        }

        function clearMemory() {
            localStorage.clear();
            location.reload();
        }

        // --- 2. 3D RESPONSIVE SPHERE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        function handleResize() {
            const container = document.getElementById('canvas-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        const geo = new THREE.IcosahedronGeometry(2, 10);
        const mat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.04 });
        const sphere = new THREE.Points(geo, mat);
        scene.add(sphere);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // --- 3. VOICE & CHAT ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        function toggleMic() { recognition.start(); }
        recognition.onstart = () => document.getElementById('micBtn').classList.add('active');
        recognition.onend = () => document.getElementById('micBtn').classList.remove('active');
        recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; send(); };

        let history = [];
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-area');
            const msg = input.value.trim(); if(!msg) return;
            input.value = '';

            checkIdentity(msg); // Check if they told ZEN their name

            chat.innerHTML += `<div class="msg"><span class="sri-name">${userName}</span>${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: `(User name is ${userName}) ${msg}`, history: history })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg"><span class="zen-name">ZEN</span>${data.response}</div>`;
                chat.scrollTop = chat.scrollHeight;
                history.push({role:"user", content:msg}, {role:"assistant", content:data.response});
                
                const voice = new SpeechSynthesisUtterance(data.response);
                voice.pitch = 1.3;
                window.speechSynthesis.speak(voice);
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
