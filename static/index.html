<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHAM_ZEN // NEURAL_INTERFACE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --midnight: #050505; }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--midnight); height: 100vh; overflow: hidden; color: #fff; }

        /* --- STUNNING LOGIN SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1), opacity 1s;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 400px;
        }
        .logo-glow {
            filter: drop-shadow(0 0 10px var(--neon-cyan));
            margin-bottom: 30px; width: 60px;
        }
        
        /* --- HIGH-END MAIN UI --- */
        #main-wrapper { 
            display: none; opacity: 0; width: 100%; height: 100vh; 
            background: #000; flex-direction: row; 
        }
        #canvas-container { flex: 1; position: relative; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        
        #ui-side { 
            width: 420px; background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(30px); border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; padding: 35px;
        }

        .zen-brand { font-size: 28px; letter-spacing: 8px; font-weight: 200; color: #fff; }
        .zen-brand span { color: var(--neon-pink); font-weight: 900; text-shadow: 0 0 15px var(--neon-pink); }
        
        #chat-area { flex: 1; overflow-y: auto; margin: 30px 0; padding-right: 10px; }
        #chat-area::-webkit-scrollbar { width: 3px; }
        #chat-area::-webkit-scrollbar-thumb { background: var(--neon-cyan); }

        .msg { margin-bottom: 20px; animation: fadeIn 0.5s ease forwards; }
        .msg-user { color: var(--neon-cyan); font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        .msg-text { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 0 15px 15px 15px; font-size: 15px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.05); }

        /* INPUT AREA */
        .input-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; padding: 5px 5px 5px 20px; display: flex; align-items: center;
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }

        #micBtn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: var(--neon-cyan); color: #000; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #micBtn.active { background: var(--neon-pink); transform: scale(1.2); box-shadow: 0 0 30px var(--neon-pink); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            #main-wrapper { flex-direction: column; }
            #ui-side { width: 100%; height: 50%; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="glass-card">
            <div style="font-size: 40px; margin-bottom: 10px;">🌑</div>
            <h1 style="letter-spacing: 5px; font-weight: 200; margin-bottom: 10px;">CORE_AUTH</h1>
            <p style="color: #666; font-size: 12px; margin-bottom: 40px; letter-spacing: 2px;">SECURE ACCESS REQUIRED</p>
            
            <div id="g_id_onload"
                 data-client_id="YOUR_CLIENT_ID_HERE.apps.googleusercontent.com"
                 data-callback="onSignIn">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill"></div>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="canvas-container"></div>
        <div id="ui-side">
            <h1 class="zen-brand">AHAM<span>ZEN</span></h1>
            <p id="user-tag" style="font-size: 10px; color: #444; margin-top: 5px; letter-spacing: 2px;">SESSION_ACTIVE // ...</p>
            
            <div id="chat-area"></div>
            
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Initialize command..." onkeypress="if(event.key==='Enter') send()">
                <button id="micBtn" onclick="toggleMic()">🎤</button>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let userEmail = "";
        let userName = "";

        // --- 1. GOOGLE LOGIN HANDLER ---
        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            userName = payload.given_name;

            document.getElementById('user-tag').innerText = `SESSION_ACTIVE // ${userEmail.toUpperCase()}`;
            
            const auth = document.getElementById('auth-screen');
            auth.style.transform = 'scale(1.5)';
            auth.style.opacity = '0';
            
            setTimeout(() => {
                auth.style.display = 'none';
                const main = document.getElementById('main-wrapper');
                main.style.display = 'flex';
                setTimeout(() => { main.style.opacity = '1'; init3D(); }, 100);
            }, 1000);
        }

        // --- 2. 3D "LIQUID NEURON" ENGINE ---
        let scene, camera, renderer, sphere, geo, originalPos;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            geo = new THREE.IcosahedronGeometry(2, 40);
            const mat = new THREE.PointsMaterial({ size: 0.015, color: 0x00ffff, transparent: true, opacity: 0.6 });
            sphere = new THREE.Points(geo, mat);
            scene.add(sphere);
            camera.position.z = 5;
            originalPos = geo.attributes.position.array.slice();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = geo.attributes.position.array;
            const t = Date.now() * 0.0015;
            for (let i = 0; i < pos.length; i += 3) {
                const x = originalPos[i], y = originalPos[i+1], z = originalPos[i+2];
                const wave = Math.sin(t + x * 2 + y * 2) * 0.15;
                pos[i] = x * (1 + wave);
                pos[i+1] = y * (1 + wave);
                pos[i+2] = z * (1 + wave);
            }
            geo.attributes.position.needsUpdate = true;
            sphere.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // --- 3. SPEECH & CHAT ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        function toggleMic() {
            if(!isListening) {
                isListening = true; document.getElementById('micBtn').classList.add('active');
                recognition.start();
            } else {
                isListening = false; document.getElementById('micBtn').classList.remove('active');
                recognition.stop();
            }
        }
        recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; send(); toggleMic(); };

        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim(); if(!msg) return;
            input.value = '';

            const chat = document.getElementById('chat-area');
            chat.innerHTML += `<div class="msg"><p class="msg-user">${userName.toUpperCase()}</p><div class="msg-text">${msg}</div></div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, user_email: userEmail })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg"><p class="msg-user" style="color:#ff00ff">ZEN_CORE</p><div class="msg-text" style="border-color:#ff00ff22">${data.response}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(data.response));
            } catch (e) {}
        }
    </script>
</body>
</html>
