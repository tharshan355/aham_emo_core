<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAM_ZEN // CORE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #auth-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        #main-ui { display: none; opacity: 0; height: 100vh; flex-direction: row; transition: 1s; }
        #canvas-box { flex: 1; background: #000; }
        
        #side-panel { width: 400px; background: rgba(5,5,5,0.98); border-left: 1px solid #222; display: flex; flex-direction: column; padding: 30px; backdrop-filter: blur(30px); }
        .brand { font-size: 24px; letter-spacing: 8px; margin-bottom: 20px; text-align: center; }
        .brand span { color: var(--pink); font-weight: bold; text-shadow: 0 0 10px var(--pink); }

        #chat { flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; scroll-behavior: smooth; }
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: #333; }

        .msg { margin-bottom: 20px; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--cyan); font-size: 14px; line-height: 1.5; animation: slideIn 0.3s ease-out; }
        .zen-msg { border-left-color: var(--pink); background: rgba(255,0,255,0.02); }
        
        .input-area { display: flex; background: #111; border-radius: 30px; padding: 5px 15px; align-items: center; border: 1px solid #333; }
        input { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; font-size: 15px; }
        #mic { cursor: pointer; font-size: 22px; transition: 0.3s; filter: grayscale(1); }
        #mic.active { filter: grayscale(0); transform: scale(1.2); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="glass">
        <h2 style="letter-spacing:5px; margin-bottom:20px;">ZEN_CORE</h2>
        <div id="g_id_onload" data-client_id="920870736896-tjt9f187s9nmhlvmdirvnknsg5hei88d.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>
</div>

<div id="main-ui">
    <div id="canvas-box"></div>
    <div id="side-panel">
        <div class="brand">AHAM<span>ZEN</span></div>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Initialize command..." onkeypress="if(event.key==='Enter') send()">
            <div id="mic" onclick="startVoice()">🎤</div>
        </div>
    </div>
</div>

<script>
    let user_email = "";
    let isThinking = false;
    let scene, camera, renderer, dust, originalPositions;

    function handleLogin(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        user_email = data.email;
        document.getElementById('auth-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('main-ui').style.opacity = '1';
            initSphere();
        }, 1000);
    }

    function initSphere() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        const box = document.getElementById('canvas-box');
        renderer.setSize(box.clientWidth, box.clientHeight);
        box.appendChild(renderer.domElement);

        const count = 15000;
        const geo = new THREE.BufferGeometry();
        const verts = new Float32Array(count * 3);
        originalPositions = new Float32Array(count * 3);

        // Golden Spiral for a Perfect Ball
        for(let i=0; i<count; i++) {
            const y = 1 - (i / (count - 1)) * 2;
            const radiusAtY = Math.sqrt(1 - y * y);
            const theta = 2.399963229728653 * i; 

            const x = Math.cos(theta) * radiusAtY;
            const z = Math.sin(theta) * radiusAtY;
            const scale = 2.4; 

            verts[i*3] = x * scale;
            verts[i*3+1] = y * scale;
            verts[i*3+2] = z * scale;
            
            originalPositions[i*3] = x * scale;
            originalPositions[i*3+1] = y * scale;
            originalPositions[i*3+2] = z * scale;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
        const mat = new THREE.PointsMaterial({ size: 0.015, color: 0x00ffff, transparent: true, opacity: 0.8 });
        dust = new THREE.Points(geo, mat);
        scene.add(dust);
        camera.position.z = 6;
        renderLoop();
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        const time = Date.now() * 0.001;
        dust.rotation.y += 0.0012;

        const target = isThinking ? new THREE.Color(0xff00ff) : new THREE.Color(0x00ffff);
        dust.material.color.lerp(target, 0.08);

        // Exact 1cm Breathing Pulse
        const pos = dust.geometry.attributes.position.array;
        const breath = 1 + (Math.sin(time * 1.5) * 0.015); 
        
        for(let i=0; i<pos.length; i+=3) {
            pos[i] = originalPositions[i] * breath;
            pos[i+1] = originalPositions[i+1] * breath;
            pos[i+2] = originalPositions[i+2] * breath;
        }
        dust.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        input.value = "";
        
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg"><b>SRI:</b> ${text}</div>`;
        chat.scrollTop = chat.scrollHeight;
        isThinking = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text, user_email: user_email })
            });
            const data = await res.json();
            
            chat.innerHTML += `<div class="msg zen-msg"><b>ZEN:</b> ${data.response}</div>`;
            chat.scrollTop = chat.scrollHeight;

            const speak = new SpeechSynthesisUtterance(data.response);
            speak.onend = () => { isThinking = false; };
            window.speechSynthesis.speak(speak);
        } catch(e) {
            isThinking = false;
            chat.innerHTML += `<div class="msg" style="border-color:red">Neural connection timeout. Verify Vercel API status.</div>`;
        }
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.onstart = () => document.getElementById('mic').classList.add('active');
        rec.onend = () => document.getElementById('mic').classList.remove('active');
        rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; send(); };
        rec.start();
    }
</script>
</body>
</html>
